name: OCR Receipts Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  paddleocr:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & push Docker image
      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/paddleocr:latest .
          docker push ghcr.io/${{ github.repository }}/paddleocr:latest

      # Run OCR container
      - name: Run OCR script
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace ghcr.io/${{ github.repository }}/paddleocr:latest

      # Upload CSV artifact
      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: all_receipts_csv
          path: aragonindustries.uk/output/all_receipts.csv
