name: PaddleOCR Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Create project files
        run: |
          mkdir -p paddleocr_project/images

          # ---------- Dockerfile for Selenium ----------
          cat > paddleocr_project/Dockerfile.selenium << 'EOF'
          FROM selenium/standalone-chrome:latest
          WORKDIR /app
          COPY process_receipts_selenium.py /app/process_receipts_selenium.py
          CMD ["python3", "/app/process_receipts_selenium.py"]
          EOF

          # ---------- Dockerfile for PaddleOCR ----------
          cat > paddleocr_project/Dockerfile.paddle << 'EOF'
          FROM python:3.10-slim
          WORKDIR /app
          RUN apt-get update && apt-get install -y --no-install-recommends \
              libglib2.0-0 libsm6 libxext6 libxrender-dev libgtk2.0-dev \
              ffmpeg wget unzip git xvfb \
              && rm -rf /var/lib/apt/lists/*
          RUN pip install --upgrade pip
          RUN pip install --no-cache-dir paddleocr==3.0.0 opencv-python-headless numpy beautifulsoup4 requests pandas
          COPY process_receipts_paddle.py /app/process_receipts_paddle.py
          COPY images /app/images
          CMD ["python", "process_receipts_paddle.py"]
          EOF

          # ---------- Selenium scraper script ----------
          cat > paddleocr_project/process_receipts_selenium.py << 'EOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          import os, time

          BASE_URL = "http://aragonindustries.uk/photos"
          OUTPUT_DIR = "images"
          os.makedirs(OUTPUT_DIR, exist_ok=True)

          chrome_options = Options()
          chrome_options.add_argument("--headless=new")
          chrome_options.add_argument("--disable-gpu")
          chrome_options.add_argument("--no-sandbox")

          driver = webdriver.Chrome(options=chrome_options)
          driver.get(BASE_URL)
          time.sleep(5)  # wait for page to load

          imgs = driver.find_elements("tag name", "img")
          print(f"[INFO] Found {len(imgs)} images")

          for i, img in enumerate(imgs):
              src = img.get_attribute("src")
              if src:
                  filename = os.path.join(OUTPUT_DIR, f"img_{i}.jpg")
                  os.system(f"wget -q '{src}' -O '{filename}'")
                  print(f"[INFO] Downloaded {filename}")
          driver.quit()
          EOF

          # ---------- PaddleOCR processor script ----------
          cat > paddleocr_project/process_receipts_paddle.py << 'EOF'
          import cv2, numpy as np, re, os
          from paddleocr import PaddleOCR
          from difflib import SequenceMatcher
          import pandas as pd

          INPUT_DIR = "images"
          OUTPUT_CSV = "all_receipts.csv"

          BAD_WORDS = ["vat","total","balance","contactless","mastercard","merchant","aid","pan","change","points","nectar","saving","originalprice","price reduction","reduction","new price","old price","sub total","www."]
          CORRECTIONS = {}

          ocr = PaddleOCR(use_angle_cls=True, lang='en')

          def clean_item(line):
              line = re.sub(r"([A-Za-z])(\d)", r"\1 \2", line)
              line = re.sub(r"[^A-Za-z0-9\s/\.]", "", line)
              return line.strip()

          def is_price(line):
              return re.fullmatch(r"\d+\.\d{2}", line)

          def is_real_item(item):
              item_lower = item.lower()
              if len(item) < 3 or item.replace(".", "", 1).isdigit():
                  return False
              return all(bad not in item_lower for bad in BAD_WORDS)

          def merge_duplicates(items):
              merged = []
              for it in items:
                  matched = False
                  for m in merged:
                      if SequenceMatcher(None,it["item"],m["item"]).ratio() > 0.9:
                          m["qty"] += 1
                          m["total"] += it["price"]
                          matched = True
                          break
                  if not matched:
                      merged.append({"item": it["item"],"qty":1,"price":it["price"],"total":it["price"]})
              return merged

          all_items = []

          for filename in os.listdir(INPUT_DIR):
              if not filename.lower().endswith((".jpg",".png")):
                  continue
              path = os.path.join(INPUT_DIR, filename)
              img = cv2.imread(path)
              if img is None:
                  continue
              result = ocr.ocr(img, cls=True)
              lines = [x[1][0].strip() for x in result[0]]
              for i,line in enumerate(lines):
                  clean_line = clean_item(line)
                  if is_price(clean_line):
                      j = i-1
                      while j>=0:
                          candidate = clean_item(lines[j])
                          if is_real_item(candidate):
                              all_items.append({"item":candidate,"price":float(clean_line)})
                              break
                          j -= 1

          merged_items = merge_duplicates(all_items)

          df = pd.DataFrame(merged_items)
          if not df.empty:
              df["total"] = df["total"].round(2)
              df["price"] = df["price"].round(2)
          df.to_csv(OUTPUT_CSV,index=False)
          print(f"[INFO] OCR processing complete. CSV saved as {OUTPUT_CSV}")
          EOF

          # ---------- docker-compose ----------
          cat > paddleocr_project/docker-compose.yml << 'EOF'
          version: "3.9"
          services:
            selenium:
              build:
                context: .
                dockerfile: Dockerfile.selenium
              volumes:
                - ./images:/app/images
            paddleocr:
              build:
                context: .
                dockerfile: Dockerfile.paddle
              volumes:
                - ./images:/app/images
          EOF

      - name: Build Docker containers
        run: |
          cd paddleocr_project
          docker-compose build

      - name: Run PaddleOCR container
        run: |
          cd paddleocr_project
          docker-compose run --rm paddleocr
