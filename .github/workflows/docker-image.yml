name: Run Receipt OCR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ocr:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t receipt_ocr .

      # 3. Run OCR
      - name: Run OCR container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace receipt_ocr

      # 4. Upload CSV output
      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: all_receipts_csv
          path: aragonindustries.uk/output/all_receipts.csv
