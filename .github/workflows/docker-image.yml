name: Build and Run PaddleOCR Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t paddleocr_image:latest .

      - name: Run Docker container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace paddleocr_image:latest

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v3
        with:
          name: receipt_csv
          path: receipt.csv
