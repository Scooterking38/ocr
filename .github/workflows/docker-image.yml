name: Build and Run PaddleOCR Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.docker-cache
          key: docker-cache-${{ github.sha }}
          restore-keys: docker-cache-

      - name: Build Docker image
        run: |
          docker build \
            --cache-from=type=local,src=/tmp/.docker-cache \
            --cache-to=type=local,dest=/tmp/.docker-cache-new \
            -t paddleocr_image:latest .

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.docker-cache
          mv /tmp/.docker-cache-new /tmp/.docker-cache

      - name: Run Docker container
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace paddleocr_image:latest

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v5
        with:
          name: receipt_csv
          path: receipt.csv
