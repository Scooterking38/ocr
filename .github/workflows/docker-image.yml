name: Full OCR Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ocr_pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Create project structure
      - name: Create folders
        run: |
          mkdir -p paddleocr_project/images
          mkdir -p paddleocr_project/output
      - name: Fix permissions for images folder
        run: |
          chmod -R 777 paddleocr_project/images

      # 3️⃣ Write Selenium scraper Python script
      - name: Create scrape_images.py
        run: |
          cat <<'EOF' > paddleocr_project/scrape_images.py
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          import os
          import requests

          os.makedirs("/app/images", exist_ok=True)

          chrome_options = Options()
          chrome_options.add_argument("--headless")
          chrome_options.add_argument("--no-sandbox")
          chrome_options.add_argument("--disable-dev-shm-usage")

          driver = webdriver.Chrome(options=chrome_options)
          driver.get("http://aragonindustries.uk/photos/")

          imgs = driver.find_elements("tag name", "img")
          for i, img in enumerate(imgs):
              src = img.get_attribute("src")
              if src:
                  # force HTTP to avoid SSL errors
                  src = src.replace("https://", "http://")
                  try:
                      r = requests.get(src, headers={"User-Agent": "Mozilla/5.0"}, timeout=10)
                      r.raise_for_status()
                      with open(f"/app/images/img_{i}.jpg", "wb") as f:
                          f.write(r.content)
                  except Exception as e:
                      print(f"Failed to download {src}: {e}")
          driver.quit()
          EOF

      # 4️⃣ Write PaddleOCR processing script
      - name: Create process_receipts_paddle.py
        run: |
          cat <<'EOF' > paddleocr_project/process_receipts_paddle.py
          from paddleocr import PaddleOCR
          import os
          import csv

          os.makedirs("/app/output", exist_ok=True)
          ocr = PaddleOCR(use_textline_orientation=True, lang='en')

          image_folder = "/app/images"
          output_file = "/app/output/all_receipts.csv"

          with open(output_file, "w", newline="") as csvfile:
              writer = csv.writer(csvfile)
              writer.writerow(["Item","Qty","Price","Total"])
              for img_file in os.listdir(image_folder):
                  img_path = os.path.join(image_folder, img_file)
                  result = ocr.ocr(img_path)
                  for line in result[0]:
                      text = " ".join([word_info[1][0] for word_info in line])
                      writer.writerow([text,"","",""])
          EOF

      # 5️⃣ Write PaddleOCR Dockerfile
      - name: Create Dockerfile.paddle
        run: |
          cat <<'EOF' > paddleocr_project/Dockerfile.paddle
          # Base image
          FROM paddlepaddle/paddle:3.3.0

          # Install dependencies
          RUN apt-get update && apt-get install -y \
              python3-pip python3-dev wget unzip git xvfb libglib2.0-0 libsm6 libxext6 libxrender-dev \
              libgtk2.0-dev ffmpeg && rm -rf /var/lib/apt/lists/*

          # Copy OCR script
          WORKDIR /app
          COPY process_receipts_paddle.py /app/process_receipts_paddle.py

          # Install Python packages
          RUN pip install --no-cache-dir paddleocr==3.0.0 opencv-python-headless numpy beautifulsoup4 requests pandas

          CMD ["python3", "process_receipts_paddle.py"]
          EOF

      # 6️⃣ Write docker-compose file
      - name: Create docker-compose.yml
        run: |
          cat <<'EOF' > paddleocr_project/docker-compose.yml
          version: '3.8'
          services:
            paddleocr:
              build:
                context: .
                dockerfile: Dockerfile.paddle
              volumes:
                - ./images:/app/images
                - ./output:/app/output
          EOF

      # 7️⃣ Pull Selenium standalone Chrome image and run scraping
      - name: Run Selenium Docker for image scraping
        run: |
          docker run --rm \
            -v $PWD/paddleocr_project/images:/app/images \
            -v $PWD/paddleocr_project:/app \
            selenium/standalone-chrome:latest \
            bash -c "pip install selenium requests && python3 /app/scrape_images.py"

      # 8️⃣ Build and run PaddleOCR Docker
      - name: Build and run PaddleOCR
        run: |
          cd paddleocr_project
          docker compose build
          docker compose run --rm paddleocr

      # 9️⃣ Upload the CSV as an artifact
      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: receipts-csv
          path: paddleocr_project/output/all_receipts.csv
